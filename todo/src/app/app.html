<div class="min-h-screen bg-black text-white p-6 md:p-10">
  <div class="max-w-5xl w-full mx-auto">
    <div class="flex items-start justify-between gap-4 mb-6">
      <h1 class="text-3xl font-semibold text-white leading-tight">Simple Worflow Menager</h1>

      <!-- Top Add button (opens modal form) -->
      <button
        type="button"
        (click)="openAddForm()"
        class="rounded-xl bg-purple-500 text-white px-5 py-3 font-medium hover:bg-purple-400 focus:outline-none focus:ring-2 focus:ring-purple-300 shadow-sm hover:shadow-md transition-shadow shrink-0"
      >
        Add
      </button>
    </div>

    @if (showAddForm()) {
      <div class="fixed inset-0 bg-black/60 flex items-center justify-center p-6">
        <div class="w-full max-w-lg rounded-xl bg-neutral-900 border border-neutral-800 p-6 shadow-lg shadow-black/40">
          <div class="flex items-center justify-between mb-4">
            <h2 class="text-neutral-200 font-medium">Add task</h2>
            <button
              type="button"
              (click)="closeAddForm()"
              class="rounded-lg bg-neutral-800 text-neutral-200 px-3 py-2 text-sm hover:bg-neutral-700 focus:outline-none focus:ring-2 focus:ring-purple-300/50"
            >
              Close
            </button>
          </div>

          <app-add-edit-task
            [title]="newTaskText()"
            [description]="newTaskDescription()"
            [status]="newTaskStatus()"
            [showStatus]="true"
            [showLabels]="true"
            [disableSubmit]="!newTaskText().trim()"
            submitLabel="Save"
            cancelLabel="Cancel"
            (titleChange)="newTaskText.set($event)"
            (descriptionChange)="newTaskDescription.set($event)"
            (statusChange)="newTaskStatus.set($event)"
            (submitForm)="addTask()"
            (cancel)="closeAddForm()"
          />
        </div>
      </div>
    }

    <app-board
      [isLoading]="isLoading()"
      [editingId]="editingId()"
      [editTitleText]="editTitleText()"
      [editDescriptionText]="editDescriptionText()"
      [tasksToBeDone]="tasksToBeDone()"
      [tasksWorkingOnIt]="tasksWorkingOnIt()"
      [tasksDone]="tasksDone()"
      (openAddWithStatus)="openAddFormWithStatus($event)"
      (startEdit)="startEdit($event)"
      (removeTask)="removeTask($event)"
      (saveEdit)="saveEdit()"
      (cancelEdit)="cancelEdit()"
      (editTitleTextChange)="editTitleText.set($event)"
      (editDescriptionTextChange)="editDescriptionText.set($event)"
    />
  </div>
</div>
